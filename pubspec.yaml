name: tindako
description: TindaKo - Your Smart Store Companion

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database
  drift: ^2.14.1
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.18

  # Navigation
  go_router: ^12.1.3

  # Utilities
  uuid: ^4.2.2
  intl: ^0.18.1
  path_provider: ^2.1.1
  path: ^1.8.3
  collection: ^1.18.0

  # Image
  image_picker: ^1.0.5
  crop_your_image: ^1.0.2

  # Swipeable
  flutter_slidable: ^3.0.1

  # PDF
  pdf: ^3.10.7
  printing: ^5.11.3

  # Cloud sync
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.14.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.3
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"